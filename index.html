<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retrosíntesis 80s</title>
    <style>
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 4px solid #ff00ff; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px #ff00ff; text-align: center; }
        .btn { background: #ff00ff; color: #fff; padding: 20px; border: none; border-radius: 50px; cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 0 15px #ff00ff; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>RETROSÍNTESIS 80s</h1>
        <p>MONTEVIDEO, URUGUAY</p>
        
        <button class="btn" onclick="iniciarRadio()">ESCUCHAR EN VIVO</button>
        
        <p id="msg" style="font-size: 12px; margin-top: 15px; color: #39ff14;"></p>
    </div>

    <script>
        function iniciarRadio() {
            var audio = new Audio("https://shaincast.caster.fm:13972/listen.mp3?auth=1");
            audio.play();
            document.getElementById('msg').innerText = "CONECTANDO AL FLUJO...";
        }
    </script>
</body>
</html>
