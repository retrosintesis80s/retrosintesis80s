
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retrosíntesis 80s</title>
    <style>
        body { background: #000; color: #0ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .radio-card { border: 4px solid #ff00ff; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px #ff00ff; }
        .btn { background: #ff00ff; color: #fff; padding: 20px 40px; border: none; border-radius: 50px; cursor: pointer; font-size: 20px; font-weight: bold; box-shadow: 0 0 15px #ff00ff; }
        .status { margin-top: 20px; color: #39ff14; font-family: monospace; }
    </style>
</head>
<body>

    <div class="radio-card">
        <h1>RETROSÍNTESIS 80s</h1>
        <p>MONTEVIDEO - URUGUAY</p>
        
        <button class="btn" id="playBtn">SINTONIZAR RADIO</button>
        
        <div id="status" class="status">SISTEMA EN ESPERA</div>
    </div>

    <script>
        const btn = document.getElementById('playBtn');
        const st = document.getElementById('status');
        let audio;

        btn.addEventListener('click', function() {
            st.innerText = "CONECTANDO...";
            
            // Creamos el audio recién cuando el usuario hace clic (truco para permisos)
            if (!audio) {
                audio = new Audio("http://shaincast.caster.fm:13972/listen.mp3?nocache=" + Date.now());
            }

            audio.play().then(() => {
                st.innerText = "● TRANSMITIENDO EN VIVO";
                btn.innerText = "PAUSAR";
            }).catch(err => {
                st.innerText = "ERROR DE SEGURIDAD";
                console.error(err);
                // Si falla, intentamos abrirlo en una ventana nueva como plan de rescate
                if(confirm("El navegador bloquea el audio. ¿Quieres abrir la radio en una pestaña directa?")) {
                    window.open("http://shaincast.caster.fm:13972/listen.mp3", "_blank");
                }
            });
        });
    </script>

</body>
</html>
