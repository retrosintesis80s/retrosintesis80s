
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrosíntesis 80s | Radio Online</title>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor Principal */
        .contenedor-radio {
            background: #121212;
            border: 4px solid #00ffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px #00ffff, inset 0 0 15px #ff00ff;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #ff00ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 3px 3px #000, 0 0 10px #ff00ff;
            margin-bottom: 5px;
        }

        .subtitulo {
            color: #00ffff;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .estado-vivo {
            background: #000;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid #39ff14;
        }

        .punto-rojo {
            color: #39ff14;
            font-weight: bold;
            animation: parpadeo 1.5s infinite;
        }

        /* Estilo del Reproductor */
        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }

        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="contenedor-radio">
        <h1>RETROSÍNTESIS</h1>
        <div class="subtitulo">ROCK & POP DE LOS 80s</div>

        <div class="estado-vivo">
            <span class="punto-rojo">● EN VIVO</span>
        </div>

        <audio controls autoplay>
            <source src="http://sapircast.caster.fm:13972/Exdw2" type="audio/mpeg">
            Tu navegador no soporta el audio.
        </audio>

        <div class="footer">
            EMITIENDO DESDE MONTEVIDEO, URUGUAY<br>
            SONIDO DIGITAL DE ALTA FIDELIDAD
        </div>
    </div>

</body>
</html>
