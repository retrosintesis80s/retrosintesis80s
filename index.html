<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retrosíntesis 80s</title>
    <style>
        body { background: #050505; color: #00ffff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 3px solid #ff00ff; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px #ff00ff; }
        .btn-radio { background: #ff00ff; color: white; border: none; padding: 20px 40px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px #ff00ff; text-transform: uppercase; }
        .btn-radio:active { transform: scale(0.95); }
        .status { margin-top: 25px; font-size: 14px; color: #39ff14; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>RETROSÍNTESIS 80s</h1>
        <p style="color: #fff; margin-bottom: 30px;">URUGUAY AL MUNDO</p>
        
        <button class="btn-radio" onclick="reproducir()">Escuchar Ahora</button>
        
        <div id="status-text" class="status">SISTEMA LISTO</div>
    </div>

    <script>
        function reproducir() {
            var st = document.getElementById("status-text");
            st.innerText = "CONECTANDO AL FLUJO...";

            // Intentamos con el formato de stream directo que menos bloquean
            var audio = new Audio("http://shaincast.caster.fm:13972/listen.mp3?type=.mp3");
            
            audio.play().then(() => {
                st.innerText = "● TRANSMITIENDO EN VIVO";
            }).catch(e => {
                st.innerText = "ERROR: PERMISO DENEGADO";
                console.log(e);
                alert("Para escuchar: Haz clic en el 'No seguro' arriba y permite 'Contenido no seguro'.");
            });
        }
    </script>

</body>
</html>
